services:
  api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:3100:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/ready', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  async-effect-worker:
    build: .
    profiles:
      - async-effect-worker
    restart: "no"
    command: ["python", "-m", "app.worker", "--shadow-once"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: mirror.ccs.tencentyun.com/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dreamjourney
      POSTGRES_USER: dreamjourney
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dreamjourney -d dreamjourney"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: mirror.ccs.tencentyun.com/library/redis:7-alpine
    restart: unless-stopped

volumes:
  postgres_data:
